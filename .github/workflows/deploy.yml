# deploy.yml — CI/CD Pipeline
# =============================
# Runs on every push to main.
#
# Interview talking point:
#   "The pipeline has two jobs that run in parallel — backend validation
#    and frontend build. They're independent so there's no reason to
#    sequence them. If both pass, the deploy steps run.
#    The whole file is beginner-readable: install → test → deploy.
#    There's nothing here I couldn't explain line-by-line."
#
# Three stages:
#   1. validate-backend  → install deps, syntax-check, run tests
#   2. build-frontend    → just copy static files (no build step needed)
#   3. deploy            → Azure App Service (backend) + Static Web Apps (frontend)
#
# Required GitHub Secrets (set in repo Settings → Secrets):
#   AZURE_WEBAPP_PUBLISH_PROFILE    → from Azure Portal → App Service → Publish Profile
#   AZURE_STATIC_WEB_APPS_API_TOKEN → from Azure Portal → Static Web App → Deployment Token

name: CI / Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  # ── 1. Backend validation ──────────────────────────────────────────────────
  validate-backend:
    name: Backend — Validate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt
        working-directory: .

      - name: Syntax check (import all modules)
        working-directory: backend
        run: |
          python -c "import analytics; print('analytics OK')"
          python -c "import insight;   print('insight OK')"
          python -c "import binance_service; print('binance_service OK')"

      - name: Health-check server starts
        working-directory: backend
        run: |
          uvicorn main:app --host 0.0.0.0 --port 8000 &
          sleep 4
          curl --fail http://localhost:8000/health
          kill %1

  # ── 2. Frontend build ──────────────────────────────────────────────────────
  build-frontend:
    name: Frontend — Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Validate HTML (check file exists and is non-empty)
        run: |
          test -f frontend/index.html && echo "index.html OK"
          test -f frontend/app.js     && echo "app.js OK"
          test -f frontend/styles.css && echo "styles.css OK"

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-static
          path: frontend/
          retention-days: 3

  # ── 3. Deploy (only on merge to main, not on PRs) ─────────────────────────
  deploy-backend:
    name: Deploy Backend → Azure App Service
    runs-on: ubuntu-latest
    needs: validate-backend
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Azure App Service (Python)
        uses: azure/webapps-deploy@v3
        with:
          app-name: crypto-intel-backend      # ← replace with your App Service name
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: backend

  deploy-frontend:
    name: Deploy Frontend → Azure Static Web Apps
    runs-on: ubuntu-latest
    needs: build-frontend
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: frontend
          output_location: ""        # static files — no build output directory needed
